<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字大師 - Eternal Edition 9.4 (全功能穩定版)</title>
    
    <!-- PWA & Mobile Meta -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 模式控制樣式 */
        .card-both .word-en, .card-both .word-zh { display: block !important; }
        .card-en .word-en { display: block !important; }
        .card-en .word-zh { display: none !important; }
        .card-zh .word-en { display: none !important; }
        .card-zh .word-zh { display: block !important; }

        .word-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-width: 2px;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            background: white;
            border-radius: 2rem;
            border-color: #f1f5f9;
        }
        
        .word-card.playing {
            border-color: #4f46e5 !important;
            box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3);
            transform: scale(1.03);
            background-color: #f5f3ff;
        }
        
        #wordGrid.blind-mode { opacity: 0.05; filter: blur(20px); pointer-events: none; }

        /* UI 設定卡片 */
        .settings-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* 漂亮切換按鈕 */
        .ui-toggle-btn {
            padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 800; border-radius: 0.75rem;
            transition: all 0.2s ease; border: 2px solid #f1f5f9;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
            white-space: nowrap; cursor: pointer; background: white;
            color: #64748b;
        }
        .ui-toggle-btn.active { 
            background-color: #4f46e5 !important; 
            color: white !important; 
            border-color: #4f46e5 !important; 
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); 
        }

        /* 單字卡切換按鈕 */
        .card-mode-toggle {
            position: absolute; top: 15px; right: 15px;
            padding: 5px 12px; background: #f8fafc;
            border-radius: 99px; display: flex; align-items: center;
            justify-content: center; gap: 4px;
            color: #6366f1; transition: all 0.2s;
            border: 1.5px solid #e2e8f0; z-index: 30;
        }
        .card-mode-toggle:hover { background: #eff6ff; border-color: #3b82f6; }
        .card-mode-toggle span { font-size: 10px; font-weight: 800; }

        /* 掌握度顏色 */
        .rate-btn { transition: all 0.2s; width: 32px; height: 32px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        .rate-1 { background-color: #059669 !important; color: white; }
        .rate-2 { background-color: #10b981 !important; color: white; }
        .rate-3 { background-color: #f59e0b !important; color: white; }
        .rate-4 { background-color: #f97316 !important; color: white; }
        .rate-5 { background-color: #ef4444 !important; color: white; }

        /* 資料夾樣式 */
        .folder-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; background: #f8fafc; border-radius: 1rem;
            cursor: pointer; transition: all 0.2s; font-weight: 800; color: #475569;
            margin-bottom: 0.25rem;
        }
        .folder-content { padding-left: 0.75rem; border-left: 2px solid #e2e8f0; margin-left: 1rem; margin-bottom: 0.75rem; }
        .unit-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 0.8rem; border-radius: 0.75rem; transition: all 0.2s;
            cursor: pointer; margin-bottom: 0.25rem; font-size: 0.85rem;
        }
        .unit-item.active { background: #4f46e5 !important; color: white !important; }

        /* 記憶曲線節點 */
        .review-node {
            flex: 0 0 auto; width: 110px; text-align: center; padding: 14px 8px;
            border-radius: 1.5rem; border: 2px solid #f1f5f9; background: white;
            transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .review-node.done { background: #4f46e5; border-color: #4f46e5; color: white; }
        .review-node.overdue { border-color: #f43f5e; background: #fff1f2; animation: border-pulse 1.5s infinite; }
        .review-node.upcoming { border-color: #e2e8f0; color: #94a3b8; }
        @keyframes border-pulse { 0% { border-color: #f43f5e; } 50% { border-color: #fda4af; } 100% { border-color: #f43f5e; } }
        
        #reviewNodes::-webkit-scrollbar, #unitTreeList::-webkit-scrollbar { height: 8px; width: 6px; }
        #reviewNodes::-webkit-scrollbar-thumb, #unitTreeList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .note-field {
            background-color: #fffbeb; border: 1px dashed #fde68a; border-radius: 0.8rem;
            padding: 0.7rem; font-size: 0.85rem; color: #92400e; width: 100%;
            margin-top: 1rem; outline: none; font-weight: 600; resize: none; min-height: 60px;
        }

        .answer-slot {
            width: 40px; height: 45px; border-bottom: 3px solid #4f46e5;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; color: #4f46e5; margin: 0 2px;
        }
        .block-letter {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            background: white; border: 2px solid #e2e8f0; border-radius: 10px;
            font-weight: 900; font-size: 18px; box-shadow: 0 3px 0 #cbd5e1;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- 英聽播放狀態條 -->
    <div id="floatingAudioBar" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] w-[92%] max-w-lg bg-white/95 backdrop-blur-xl border border-indigo-100 shadow-2xl rounded-full p-4 flex items-center justify-between opacity-0 pointer-events-none transition-all duration-500 font-bold">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg text-white font-bold"><i data-lucide="headphones" class="w-5 h-5"></i></div>
            <div>
                <p class="text-[10px] font-black text-indigo-600 uppercase">英聽訓練</p>
                <p id="floatingStatusText" class="text-sm font-black text-slate-700">準備中...</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.togglePause()" class="p-3 bg-indigo-50 text-indigo-600 rounded-full border border-indigo-100 font-bold"><i data-lucide="pause" id="pauseIcon" class="w-5 h-5"></i></button>
            <button onclick="window.stopAutoPlay()" class="p-3 bg-rose-500 text-white rounded-full shadow-lg"><i data-lucide="square" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- 1. 登入畫面 -->
    <div id="authScreen" class="hidden flex items-center justify-center min-h-screen p-4 text-center font-bold">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 font-bold">
            <div id="loginMainView">
                <div class="mb-8 font-bold">
                    <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl"><i data-lucide="graduation-cap" class="text-white w-10 h-10"></i></div>
                    <h1 class="text-3xl font-black tracking-tight text-slate-800 mb-1">單字大師</h1>
                    <p class="text-slate-400 font-medium italic text-xs">Eternal Edition 9.4</p>
                </div>
                <div class="space-y-4">
                    <button onclick="window.toggleAuthView('custom')" class="w-full bg-slate-800 hover:bg-black text-white font-black py-4 rounded-[1.2rem] shadow-lg flex items-center justify-center gap-3 text-md font-bold"><i data-lucide="user" class="w-5 h-5 text-white"></i> 使用帳號登入</button>
                </div>
                <div class="mt-8 border-t pt-6 font-bold">
                    <button onclick="window.toggleAuthView('admin')" class="text-xs text-slate-400 font-bold underline decoration-dotted font-bold">管理者模式</button>
                    <p class="mt-4 text-[10px] text-slate-300 font-black tracking-wider uppercase font-bold">最後更新：2026-02-23 20:15</p>
                </div>
            </div>
            
            <div id="customLoginView" class="hidden text-left font-bold">
                <button onclick="window.toggleAuthView('main')" class="text-slate-400 mb-6 flex items-center gap-2 text-xs font-black font-bold"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回</button>
                <h2 class="text-2xl font-bold mb-6 text-slate-800 font-bold">學生登入</h2>
                <div class="space-y-4">
                    <input type="text" id="customUser" placeholder="帳號 ID" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold">
                    <input type="password" id="customPass" placeholder="密碼" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold">
                    <button onclick="window.loginWithCustom()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-xl font-bold">確認進入</button>
                </div>
            </div>

            <div id="adminLoginView" class="hidden text-left font-bold">
                <button onclick="window.toggleAuthView('main')" class="text-slate-400 mb-6 flex items-center gap-1 text-sm font-black font-bold font-bold"><i data-lucide="arrow-left" class="w-4 h-4 font-bold"></i> 返回</button>
                <h2 class="text-2xl font-black mb-6 text-slate-800 font-bold font-bold">管理中心</h2>
                <div class="space-y-4 font-bold">
                    <input type="text" id="adminUser" placeholder="管理員 ID" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none font-bold">
                    <input type="password" id="adminPass" placeholder="管理密碼" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none font-bold">
                    <button onclick="window.adminLogin()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black shadow-xl font-bold font-bold">授權進入</button>
                </div>
            </div>
            <div id="loadingIndicator" class="hidden mt-6 text-sm text-slate-400 flex items-center justify-center gap-2 font-bold"><div class="w-4 h-4 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><span>連線中...</span></div>
        </div>
    </div>

    <!-- 2. 使用者主介面 -->
    <div id="appScreen" class="hidden font-bold">
        <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 h-20 flex items-center justify-between px-6 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg text-white font-bold font-bold"><i data-lucide="graduation-cap" class="w-6 h-6"></i></div>
                <span class="text-xl font-black uppercase tracking-tighter text-slate-800 font-bold">單字大師</span>
            </div>
            <div class="flex items-center gap-4 font-bold">
                <button id="btnBackToAdmin" onclick="window.showAdminDashboard()" class="hidden flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black">管理者後台</button>
                <button id="btnPublishGuest" onclick="window.publishGuestLink()" class="flex items-center gap-2 bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-xs font-black border border-emerald-100 font-bold"><i data-lucide="share-2" class="w-4 h-4"></i> 發佈連結</button>
                <span id="userNameDisplay" class="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200"></span>
                <button onclick="window.logout()" class="text-xs font-black text-rose-500 hover:bg-rose-50 px-3 py-1.5 rounded-lg font-bold font-bold">登出</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 font-bold">
            <!-- 側邊欄 -->
            <div class="lg:col-span-4 space-y-6">
                <div id="addUnitSection" class="settings-card font-bold">
                    <div class="flex justify-between items-center mb-4 font-bold">
                        <h2 class="text-lg font-bold flex items-center gap-2 text-slate-800 font-bold"><i data-lucide="layers" class="text-indigo-600 w-5 h-5 font-bold"></i> 課程架構</h2>
                        <button onclick="window.createNewFolder()" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-all font-bold"><i data-lucide="folder-plus" class="w-4 h-4 font-bold"></i></button>
                    </div>
                    <div class="space-y-3 font-bold font-bold">
                        <input type="text" id="unitNameInput" placeholder="新單元名稱" class="w-full px-4 py-2 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold">
                        <textarea id="wordsInput" placeholder="單字,定義 (每行一組)" rows="3" class="w-full px-4 py-2 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold"></textarea>
                        <button onclick="window.importWords()" class="w-full py-3 bg-indigo-600 text-white font-black rounded-xl shadow-md font-bold font-bold">儲存單元</button>
                    </div>
                </div>
                
                <div class="settings-card font-bold">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 font-bold">單元目錄 (資料夾)</h2>
                    <div id="unitTreeList" class="space-y-2 max-h-[500px] overflow-y-auto pr-1 font-bold font-bold"></div>
                </div>
            </div>
            
            <!-- 主內容 -->
            <div class="lg:col-span-8 space-y-6 font-bold font-bold">
                <!-- 控制面板 -->
                <div class="settings-card space-y-6 font-bold">
                    <div class="flex flex-wrap items-center justify-between gap-4 font-bold">
                        <div class="flex items-center gap-2 font-bold">
                            <span class="text-[10px] font-black text-slate-400 uppercase mr-2 font-bold">顯示模式</span>
                            <div class="flex bg-slate-100 p-1 rounded-xl">
                                <button onclick="window.setGlobalMode('both')" class="ui-toggle-btn" id="btn-both">中英</button>
                                <button onclick="window.setGlobalMode('en')" class="ui-toggle-btn ml-1" id="btn-en">英文</button>
                                <button onclick="window.setGlobalMode('zh')" class="ui-toggle-btn ml-1" id="btn-zh">中文</button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 font-bold">
                            <button id="toggle-syllables-btn" onclick="window.toggleFeature('syllables')" class="ui-toggle-btn font-bold">音節</button>
                            <button id="toggle-vowels-btn" onclick="window.toggleFeature('vowels')" class="ui-toggle-btn font-bold">母音</button>
                            <button id="toggle-rating-btn" onclick="window.toggleFeature('rating')" class="ui-toggle-btn font-bold">掌握度</button>
                            <button id="toggle-note-btn" onclick="window.toggleFeature('note')" class="ui-toggle-btn font-bold">筆記</button>
                        </div>
                    </div>

                    <div class="border-t pt-6 grid grid-cols-1 md:grid-cols-2 gap-6 font-bold font-bold">
                        <div class="space-y-4 font-bold">
                            <div class="flex flex-wrap items-center gap-2 font-bold">
                                <div class="flex items-center gap-2 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-100 text-amber-700 font-bold">
                                    <span class="text-[10px] font-bold">範圍</span>
                                    <input type="number" id="audioRangeStart" value="1" min="1" class="w-8 bg-transparent text-center outline-none font-bold">
                                    <span>~</span>
                                    <input type="number" id="audioRangeEnd" value="20" min="1" class="w-8 bg-transparent text-center outline-none font-bold">
                                </div>
                                <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-xl border border-indigo-100 text-indigo-700 font-bold">
                                    <span class="text-[10px]">次數</span>
                                    <input type="number" id="playCountInput" value="2" min="1" max="10" class="w-8 bg-transparent text-center outline-none font-bold">
                                    <span>|</span>
                                    <span class="text-[10px]">間隔(秒)</span>
                                    <input type="number" id="playIntervalInput" value="2" min="1" max="10" class="w-8 bg-transparent text-center outline-none font-bold font-bold">
                                </div>
                            </div>
                            <div class="flex gap-4 p-1.5 bg-slate-100 rounded-xl border font-bold">
                                <label class="flex items-center gap-1.5 cursor-pointer font-bold"><input type="checkbox" id="audioVisualSync" checked onchange="window.handleSyncModeChange('sync')" class="w-4 h-4 rounded text-indigo-600 font-bold"><span class="text-xs font-bold text-slate-600">同步</span></label>
                                <label class="flex items-center gap-1.5 cursor-pointer font-bold font-bold"><input type="checkbox" id="audioBlindMode" onchange="window.handleSyncModeChange('blind')" class="w-4 h-4 rounded text-rose-600 font-bold font-bold"><span class="text-xs font-bold text-slate-600 font-bold font-bold">盲聽</span></label>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 font-black font-bold">
                            <button onclick="window.startAutoPlay()" class="py-3 bg-indigo-600 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center gap-1 hover:bg-indigo-700 font-bold"><i data-lucide="play" class="w-5 h-5 font-bold"></i>英聽朗讀</button>
                            <button onclick="window.startRangeQuiz('block')" class="py-3 bg-amber-500 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center gap-1 hover:bg-amber-600 font-bold font-bold"><i data-lucide="layout-grid" class="w-5 h-5 font-bold"></i>拼字積木</button>
                            <button onclick="window.startRangeQuiz('dictation')" class="py-3 bg-rose-500 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center gap-1 hover:bg-rose-600 font-bold font-bold"><i data-lucide="keyboard" class="w-5 h-5 font-bold"></i>聽寫挑戰</button>
                        </div>
                    </div>
                </div>

                <!-- 記憶曲線追蹤 -->
                <div id="reviewTrackingArea" class="settings-card font-bold font-bold">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-4 font-bold">
                        <div class="flex flex-col font-bold">
                            <h4 class="text-sm font-black text-slate-800 flex items-center gap-2 font-bold font-bold font-bold"><i data-lucide="brain" class="text-indigo-600 w-4 h-4 font-bold"></i> 記憶曲線追蹤</h4>
                            <p id="reviewSummary" class="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-tighter font-bold">設定起始時間開始</p>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border font-bold">
                            <span class="text-[10px] text-slate-400 font-black font-bold">起始:</span>
                            <input type="date" id="baseDateInput" onchange="window.updateBaseDateTime()" class="bg-transparent text-xs font-bold outline-none text-slate-600 cursor-pointer font-bold">
                            <input type="time" id="baseTimeInput" onchange="window.updateBaseDateTime()" class="bg-transparent text-xs font-bold outline-none text-slate-600 cursor-pointer font-bold">
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden"><div id="reviewProgressBar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div></div>

                </div>

                <div class="flex justify-between items-end px-2 font-bold">
                    <h3 id="activeUnitTitle" class="text-2xl font-black italic text-slate-800 font-bold font-bold">請選單元</h3>
                    <select id="sortSelect" onchange="window.renderWords()" class="bg-transparent text-xs font-black border-b-2 border-indigo-500 text-indigo-600 pb-1 outline-none font-bold font-bold">
                        <option value="original">原始順序</option><option value="random">隨機</option><option value="az">A-Z</option><option value="rating">掌握度</option>
                    </select>
                </div>

                <div id="wordGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20 font-bold font-bold font-bold"></div>
            </div>
        </main>
    </div>

    <!-- 管理者介面 -->
    <div id="adminScreen" class="hidden bg-slate-50 min-h-screen pb-10 text-slate-800 font-bold font-bold font-bold">
        <nav class="bg-slate-900 text-white h-20 flex items-center justify-between px-8 sticky top-0 z-50 shadow-lg font-bold font-bold">
            <span class="font-black tracking-widest uppercase text-xl text-indigo-400 font-bold font-bold font-bold">YLJH 管理系統</span>
            <div class="flex gap-4">
                <button onclick="window.switchToAppMode()" class="bg-indigo-600 px-4 py-2 rounded-xl text-sm font-bold font-bold font-bold">模板製作</button>
                <button onclick="window.logout()" class="bg-white/10 px-4 py-2 rounded-xl text-sm font-bold font-bold font-bold font-bold">登出</button>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-8 py-10 font-bold font-bold">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="settings-card text-center font-bold">
                    <h3 class="text-xl font-black mb-6 font-bold font-bold">建立學生帳號</h3>
                    <div class="space-y-4">

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDYxUj8FG0KCQIkuBZNjqENH9K8aLDHsYQ", authDomain: "my-vocab-app-852b4.firebaseapp.com", projectId: "my-vocab-app-852b4", storageBucket: "my-vocab-app-852b4.firebasestorage.app", messagingSenderId: "79896462245", appId: "1:79896462245:web:1ece173ddc5a6d05781e4c", measurementId: "G-HSMRF8W6SW" };
        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const STAGES = [
            { id: "s1", name: "第一次", offsetH: 0, label: "立即" }, { id: "s2", name: "第二次", offsetH: 0.5, label: "30分" }, { id: "s3", name: "第三次", offsetH: 12, label: "12時" },
            { id: "d1", name: "第四次", offsetH: 24, label: "1天" }, { id: "d2", name: "第五次", offsetH: 48, label: "2天" }, { id: "d4", name: "第六次", offsetH: 96, label: "4天" },
            { id: "d7", name: "第七次", offsetH: 168, label: "7天" }, { id: "d15", name: "第八次", offsetH: 360, label: "15天" },
            { id: "m1", name: "第九次", offsetH: 720, label: "1月" }, { id: "m3", name: "第十次", offsetH: 2160, label: "3月" }, { id: "m6", name: "第十一次", offsetH: 4320, label: "6月" }
        ];

        const state = { 
            units: [], folders: [], activeUnitId: null, globalMode: 'both', userLabel: null,
            isAudioPlaying: false, isPaused: false, displayedWords: [], 
            showSyllables: false, showVowels: false, showRating: false, showNote: false,
            openFolders: new Set(), movingUnitId: null, allUnitsCache: [], voice: null,
            quizQueue: [], quizIndex: 0, quizType: 'block', currentAnswer: [], usedIndexes: [], quizLetters: []
        };

        // --- 音節邏輯 ---
        function formatSyllables(w) {
            if (!w || w.includes(" ") || w.length <= 3) return w;
            const vs = "aeiouy", isV = (c) => vs.includes(c.toLowerCase());
            let chunks = [], i = 0, o = w.toLowerCase();
            while (i < o.length) {
                let char = o[i], type = isV(char) ? 'V' : 'C', cluster = char;
                while (i + 1 < o.length && (isV(o[i+1]) === isV(char))) cluster += o[++i];
                chunks.push({ type, val: cluster }); i++;
            }
            if (chunks.length > 2 && chunks[chunks.length-1].val === 'e' && chunks[chunks.length-2].type === 'C') chunks[chunks.length-2].val += chunks.pop().val;
            let res = "";
            for (let k = 0; k < chunks.length; k++) {
                res += chunks[k].val;
                if (chunks[k].type === 'V' && k < chunks.length - 1) {
                    let nC = chunks[k+1], nV = chunks[k+2];
                    if (nC && nC.type === 'C' && nV && nV.type === 'V') res += "·";
                }
            }
            return res.replace(/·$/, "");
        }

        window.speak = (t) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'en-US'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        };

        // --- 核心渲染 ---
        window.renderWords = () => {
            const g = document.getElementById('wordGrid'), u = state.units.find(x => x.id == state.activeUnitId);
            if (!u || !g) return;
            let list = [...(u.words || [])], sort = document.getElementById('sortSelect').value;
            if (sort === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
            else if (sort === 'random') list.sort(() => Math.random() - 0.5);
            else if (sort === 'rating') list.sort((a,b) => b.rating - a.rating);
            state.displayedWords = list;
            document.getElementById('activeUnitTitle').innerText = u.name;
            
            const updateBtn = (id, active) => { const b = document.getElementById(id); if(b) active ? b.classList.add('active') : b.classList.remove('active'); };
            ['both','en','zh'].forEach(m => updateBtn(`btn-${m}`, state.globalMode === m));
            ['syllables', 'vowels', 'rating', 'note'].forEach(f => updateBtn(`toggle-${f}-btn`, state['show'+f.charAt(0).toUpperCase()+f.slice(1)]));

            g.innerHTML = list.map((w, idx) => {
                const mode = w.localMode || state.globalMode;
                const highlight = (t) => {
                    let p = state.showSyllables ? formatSyllables(t) : t;
                    if (state.showVowels) p = p.replace(/[aeiouAEIOU]/g, (m) => `<span class="text-rose-600 font-black">${m}</span>`);
                    return p;
                };
                return `<div data-word-id="${w.id}" onclick="window.speak('${w.en}')" class="word-card card-${mode} hover:shadow-xl transition-all font-bold">
                    <span style="position:absolute; top:-10px; left:-10px; width:22px; height:22px; background:white; border:1px solid #e2e8f0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#cbd5e1; z-index:10;">${idx+1}</span>
                    <button onclick="event.stopPropagation(); window.cycleWordMode('${w.id}')" class="card-mode-toggle font-bold"><span>${mode==='both'?'中英':mode==='en'?'僅英':'僅中'}</span></button>
                    <div class="pr-20"><h4 class="word-en text-4xl font-black text-slate-800 tracking-tight leading-tight font-bold font-bold">${highlight(w.en)}</h4><p class="word-zh text-indigo-600 font-bold text-xl mt-1">${w.zh}</p></div>
                    <div class="mt-auto pt-4 flex items-center justify-between font-bold">
                        <button class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl font-bold font-bold"><i data-lucide="volume-2" class="w-5 h-5 font-bold font-bold"></i></button>
                        ${state.showRating ? `<div class="flex gap-1">${[1,2,3,4,5].map(n => `<button onclick="event.stopPropagation(); window.updateRating('${w.id}', ${n})" class="rate-btn ${w.rating==n?'rate-'+n:'bg-slate-100 text-slate-400'} font-bold">${n}</button>`).join('')}</div>` : ''}
                    </div>
                    ${state.showNote ? `<textarea class="note-field font-bold" placeholder="備註..." onclick="event.stopPropagation()" onblur="window.updateNote('${w.id}', this.value)">${w.note || ''}</textarea>` : ''}
                </div>`}).join(''); lucide.createIcons(); window.renderReviewTracking();
        };

        window.renderUnitList = () => {
            const container = document.getElementById('unitTreeList'); if (!container) return;
            let html = "";
            state.folders.forEach(folder => {
                const isOpen = state.openFolders.has(folder.id);
                const folderUnits = state.units.filter(u => u.folderId === folder.id);
                html += `
                <div class="mb-2 font-bold">
                    <div class="folder-header" onclick="window.toggleFolder('${folder.id}')">
                        <div class="flex items-center gap-2 font-bold"><i data-lucide="${isOpen ? 'folder-open' : 'folder'}" class="w-4 h-4 text-amber-500 font-bold"></i><span class="text-sm font-bold font-bold">${folder.name}</span></div>
                        <div class="flex items-center gap-2 font-bold"><span class="text-[10px] bg-slate-200 px-1.5 rounded-full font-bold">${folderUnits.length}</span><button onclick="event.stopPropagation(); window.deleteFolder('${folder.id}')" class="text-slate-300 hover:text-rose-500 p-1 font-bold"><i data-lucide="trash-2" class="w-3 h-3 font-bold"></i></button></div>
                    </div>
                    ${isOpen ? `<div class="folder-content font-bold">${folderUnits.map(u => `
                        <div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId === u.id ? 'active' : ''} font-bold">
                            <span class="truncate flex-1 font-bold">${u.name}</span>
                            <div class="flex gap-1 items-center font-bold">
                                <button onclick="event.stopPropagation(); window.openMoveModal('${u.id}')" class="p-1 opacity-40 hover:opacity-100 font-bold"><i data-lucide="folder-input" class="w-3 h-3 font-bold font-bold"></i></button>
                                <button onclick="event.stopPropagation(); window.deleteUnit('${u.id}')" class="p-1 opacity-40 hover:opacity-100 font-bold font-bold font-bold"><i data-lucide="trash-2" class="w-3 h-3 font-bold font-bold"></i></button>
                            </div>
                        </div>`).join('')}</div>` : ''}
                </div>`;
            });
            const uncategorized = state.units.filter(u => !u.folderId);
            if (uncategorized.length > 0) {
                html += `<div class="mt-4 mb-1 text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2 font-bold font-bold font-bold">未分類</div>`;
                html += uncategorized.map(u => `<div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId === u.id ? 'active' : ''} font-bold">
                        <span class="truncate flex-1 font-bold font-bold font-bold">${u.name}</span>
                        <div class="flex gap-1 items-center font-bold">
                            <button onclick="event.stopPropagation(); window.openMoveModal('${u.id}')" class="p-1 opacity-40 hover:opacity-100 font-bold"><i data-lucide="folder-input" class="w-3 h-3 font-bold"></i></button>
                            <button onclick="event.stopPropagation(); window.deleteUnit('${u.id}')" class="p-1 opacity-40 hover:opacity-100 font-bold"><i data-lucide="trash-2" class="w-3 h-3 font-bold"></i></button>
                        </div>
                    </div>`).join('');
            }
            container.innerHTML = html || `<p class="text-center py-6 text-slate-300 text-xs font-bold font-bold font-bold">尚無單元</p>`;
            lucide.createIcons();
        };

        // --- 核心工具與播放 ---
        window.startAutoPlay = async () => {
            if (state.isAudioPlaying) return;
            const fullList = state.displayedWords; if (fullList.length === 0) return;
            const startIdx = Math.max(0, (parseInt(document.getElementById('audioRangeStart').value) || 1) - 1);
            const endIdx = Math.min(fullList.length, parseInt(document.getElementById('audioRangeEnd').value) || 20);
            const playList = fullList.slice(startIdx, endIdx);
            if (playList.length === 0) return window.showNotification("範圍內無單字");
            const reps = parseInt(document.getElementById('playCountInput').value) || 2, sec = parseInt(document.getElementById('playIntervalInput').value) || 2, isSync = document.getElementById('audioVisualSync').checked, isBlind = document.getElementById('audioBlindMode').checked;
            state.isAudioPlaying = true; state.isPaused = false;
            document.getElementById('floatingAudioBar').classList.add('opacity-100', 'pointer-events-auto');
            if(isBlind) document.getElementById('wordGrid').classList.add('blind-mode');
            for (let i = 0; i < playList.length; i++) {
                if (!state.isAudioPlaying) break;
                document.getElementById('floatingStatusText').innerText = `正在播放 ${i+1}/${playList.length}`;
                if(isSync) {
                    document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
                    const target = document.querySelector(`[data-word-id="${playList[i].id}"]`);
                    if(target) { target.classList.add('playing'); target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                for (let r = 0; r < reps; r++) {
                    if (!state.isAudioPlaying) break;
                    while (state.isPaused) { await new Promise(res => setTimeout(res, 200)); if (!state.isAudioPlaying) return; }
                    window.speak(playList[i].en);
                    await new Promise(res => setTimeout(res, 1500 + (sec * 1000)));
                }
            }
            window.stopAutoPlay();
        };

        window.renderReviewTracking = () => {
            const container = document.getElementById('reviewNodes'), summary = document.getElementById('reviewSummary'), progressFill = document.getElementById('reviewProgressBar');
            const u = state.units.find(u => u.id === state.activeUnitId);
            if (!u || !container) return;
            const progress = u.reviewProgress || {}, baseDate = u.baseDate || "", baseTime = u.baseTime || "09:00";
            if(document.getElementById('baseDateInput')) document.getElementById('baseDateInput').value = baseDate;
            if(document.getElementById('baseTimeInput')) document.getElementById('baseTimeInput').value = baseTime;
            const doneCount = STAGES.filter(s => progress[s.id]).length, completionRate = Math.round((doneCount / STAGES.length) * 100);
            summary.innerText = baseDate ? `複習進度：${doneCount}/${STAGES.length} (${completionRate}%)` : "設定起始時間開始";
            progressFill.style.width = `${completionRate}%`;
            const now = Date.now();
            container.innerHTML = STAGES.map(stage => {
                const isDone = !!progress[stage.id];
                let statusClass = "upcoming"; let dateStr = "--/--", hourStr = "--:--";
                if (baseDate) {
                    const startTs = new Date(`${baseDate}T${baseTime}`).getTime();
                    const targetTs = startTs + (stage.offsetH * 60 * 60 * 1000);
                    const d = new Date(targetTs);
                    dateStr = `${d.getMonth()+1}/${d.getDate()}`; hourStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    if (isDone) statusClass = "done"; else if (now > targetTs) statusClass = "overdue";
                }
                return `<div onclick="window.toggleReviewStage('${stage.id}')" class="review-node ${statusClass} font-bold font-bold font-bold font-bold"><div class="node-label">${stage.label}後</div><div class="node-name">${stage.name}</div><div class="node-time">${dateStr} ${hourStr}</div></div>`;
            }).join(''); lucide.createIcons();
        };

        // --- 業務處理 ---
        onAuthStateChanged(auth, async (user) => {
            const adminSess = sessionStorage.getItem('admin_session'), customSess = sessionStorage.getItem('custom_user_session');
            if (!user) { await signInAnonymously(auth); return; }
            if (adminSess === 'true') { state.userLabel = 'yljh'; window.showAdminDashboard(); }
            else if (customSess) { state.userLabel = customSess; window.showAppUI(customSess); syncData(); }
            else document.getElementById('authScreen').classList.remove('hidden');
            lucide.createIcons();
        });

        function syncData() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'folders'), (snap) => {
                state.folders = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(f => f.ownerId === state.userLabel);
                window.renderUnitList();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), (snap) => {
                state.units = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(u => u.ownerId === state.userLabel);
                if (!state.activeUnitId && state.units.length > 0) state.activeUnitId = state.units[0].id;
                window.renderUnitList(); window.renderWords();
            });
        }

        window.setGlobalMode = (m) => { state.globalMode = m; if(state.activeUnitId) { const u = state.units.find(x => x.id === state.activeUnitId); if(u) u.words.forEach(w => delete w.localMode); } window.renderWords(); };
        window.toggleFeature = (f) => { state['show'+f.charAt(0).toUpperCase()+f.slice(1)] = !state['show'+f.charAt(0).toUpperCase()+f.slice(1)]; window.renderWords(); };
        window.cycleWordMode = (id) => { const u = state.units.find(x => x.id == state.activeUnitId), w = u.words.find(x => x.id == id); const c = w.localMode || state.globalMode; w.localMode = c === 'both' ? 'en' : c === 'en' ? 'zh' : 'both'; window.renderWords(); };
        window.updateRating = async (id, n) => { const u = state.units.find(x => x.id == state.activeUnitId), w = u.words.find(x => x.id == id); if (w) { w.rating = n; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.activeUnitId), { words: u.words }); window.renderWords(); } };
        window.updateNote = async (id, val) => { const u = state.units.find(u => u.id === state.activeUnitId), w = u.words.find(w => w.id === id); if (w && w.note !== val) { w.note = val; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.activeUnitId), { words: u.words }); } };
        window.togglePause = () => { state.isPaused = !state.isPaused; const icon = document.getElementById('pauseIcon'); icon.setAttribute('data-lucide', state.isPaused ? 'play' : 'pause'); lucide.createIcons(); if(state.isPaused) window.speechSynthesis.pause(); else window.speechSynthesis.resume(); };
        window.stopAutoPlay = () => { state.isAudioPlaying = false; state.isPaused = false; window.speechSynthesis.cancel(); document.getElementById('floatingAudioBar').classList.remove('opacity-100', 'pointer-events-auto'); document.getElementById('wordGrid').classList.remove('blind-mode'); document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing')); };
        window.createNewFolder = async () => { const n = prompt("資料夾名稱："); if (!n) return; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', 'f'+Date.now()), { name: n, ownerId: state.userLabel }); window.showNotification("資料夾已建立"); };
        window.deleteFolder = async (id) => { if (confirm("刪除資料夾？單元將變為未分類。")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', id)); const batch = state.units.filter(u => u.folderId === id); for (let u of batch) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', u.id), { folderId: null }); } };
        window.openMoveModal = (id) => { state.movingUnitId = id; const s = document.getElementById('targetFolderSelect'); s.innerHTML = `<option value="">(無資料夾)</option>` + state.folders.map(f => `<option value="${f.id}">${f.name}</option>`).join(''); document.getElementById('moveFolderModal').classList.remove('hidden'); };
        window.confirmMoveUnit = async () => { const fid = document.getElementById('targetFolderSelect').value || null; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.movingUnitId), { folderId: fid }); document.getElementById('moveFolderModal').classList.add('hidden'); window.showNotification("已移動"); };
        window.closeMoveModal = () => document.getElementById('moveFolderModal').classList.add('hidden');
        window.toggleFolder = (id) => { if (state.openFolders.has(id)) state.openFolders.delete(id); else state.openFolders.add(id); window.renderUnitList(); };
        window.updateBaseDateTime = async () => { const d = document.getElementById('baseDateInput').value, t = document.getElementById('baseTimeInput').value || "09:00"; if (state.activeUnitId && d) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.activeUnitId), { baseDate: d, baseTime: t }); window.renderReviewTracking(); };
        window.toggleReviewStage = async (sid) => { const u = state.units.find(u => u.id === state.activeUnitId); if (!u) return; if (!u.reviewProgress) u.reviewProgress = {}; u.reviewProgress[sid] = u.reviewProgress[sid] ? null : Date.now(); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.activeUnitId), { reviewProgress: u.reviewProgress }); window.renderReviewTracking(); };
        window.showNotification = (t) => { const el = document.getElementById('notification'); document.getElementById('notificationText').innerText = t; el.classList.replace('translate-y-20', 'translate-y-0'); el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => { el.classList.replace('translate-y-0', 'translate-y-20'); el.classList.replace('opacity-100', 'opacity-0'); }, 4000); };
        window.loginWithCustom = async function() { const u = document.getElementById('customUser').value.trim(), p = document.getElementById('customPass').value.trim(); if (!u || !p) return; document.getElementById('loadingIndicator').classList.remove('hidden'); try { await signInAnonymously(auth); const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom_accounts', u)); if (snap.exists() && snap.data().password === p) { sessionStorage.setItem('custom_user_session', u); location.reload(); } else window.showNotification("帳密錯誤"); } catch (e) { window.showNotification("連線失敗"); } finally { document.getElementById('loadingIndicator').classList.add('hidden'); } };
        window.importWords = async () => { const n = document.getElementById('unitNameInput').value.trim(), t = document.getElementById('wordsInput').value.trim(); if (!n || !t) return; const words = t.split('\n').map(l => { const p = l.split(/[,，]/); return p.length >= 2 ? { id: 'w'+Date.now()+Math.random().toString(36).substr(2,5), en: p[0].trim(), zh: p[1].trim(), rating: 3, note: "" } : null; }).filter(x => x); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', 'u'+Date.now()), { name: n, words, ownerId: state.userLabel, isPublished: true, folderId: null }); document.getElementById('unitNameInput').value = ''; document.getElementById('wordsInput').value = ''; window.showNotification("儲存成功"); };
        window.deleteUnit = async (id) => { if (confirm("確定刪除？")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', id)); };
        window.logout = () => { signOut(auth); sessionStorage.clear(); location.href = location.pathname; };
        window.toggleAuthView = (m) => { ['loginMainView', 'customLoginView', 'adminLoginView'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(m === 'main' ? 'loginMainView' : m + 'LoginView').classList.remove('hidden'); lucide.createIcons(); };
        window.showAppUI = (name) => { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('adminScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); document.getElementById('userNameDisplay').innerText = name; lucide.createIcons(); };
        window.switchToAppMode = () => { state.userLabel = 'yljh'; window.showAppUI("管理員 (製作)"); document.getElementById('btnBackToAdmin').classList.remove('hidden'); syncData(); };
        window.showAdminDashboard = () => { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.add('hidden'); document.getElementById('adminScreen').classList.remove('hidden'); onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'custom_accounts'), (snap) => { state.allAccounts = snap.docs.map(d => d.id); document.getElementById('adminUserTable').innerHTML = state.allAccounts.map(id => `<tr class="border-b"><td class="px-6 py-4 font-bold font-bold font-bold font-bold font-bold">${id}</td><td class="px-6 py-4 text-right"> <button onclick="window.adminDetail('${id}', '${id}')" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold">管理</button> <button onclick="window.deleteAccount('${id}')" class="text-rose-400 p-1.5"><i data-lucide="trash-2" class="w-4 h-4"></i></button> </td></tr>`).join(''); lucide.createIcons(); document.getElementById('sourceAccountSelect').innerHTML = `<option value="">來源...</option>` + ['yljh', ...state.allAccounts].map(id => `<option value="${id}">${id==='yljh'?'管理員':id}</option>`).join(''); }); onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), (snap) => { state.allUnitsCache = snap.docs.map(d => ({ id: d.id, ...d.data() })); }); };
        window.adminDetail = async (uid, name) => { state.currentAdminViewUid = uid; document.getElementById('adminDetailModal').classList.remove('hidden'); document.getElementById('detailUserTitle').innerText = `${name} 練習紀錄`; const filtered = state.allUnitsCache.filter(u => u.ownerId === uid); document.getElementById('detailContent').innerHTML = filtered.map(u => `<div class="bg-slate-100 p-4 rounded-xl border font-bold"><h6>${u.name}</h6><div class="text-[10px] mt-1 text-slate-500 font-bold font-bold font-bold">${u.words.map(w => w.en).join(', ')}</div></div>`).join('') || '尚未有單元。'; lucide.createIcons(); };
        window.assignUnitToStudent = async () => { const unitId = document.getElementById('masterUnitSelect').value, target = state.currentAdminViewUid; if (!unitId || !target) return; const source = state.allUnitsCache.find(u => u.id === unitId); const newId = 'u' + Date.now(); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', newId), { ...source, ownerId: target, reviewProgress: {}, baseDate: new Date().toISOString().split('T')[0], baseTime: "09:00" }); window.showNotification("分派成功"); window.adminDetail(target, target); };
        window.updateSourceUnitList = () => { const src = document.getElementById('sourceAccountSelect').value; const filtered = state.allUnitsCache.filter(u => u.ownerId === src); document.getElementById('masterUnitSelect').innerHTML = filtered.length === 0 ? `<option value="">無單元</option>` : `<option value="">選取單元...</option>` + filtered.map(u => `<option value="${u.id}">${u.name}</option>`).join(''); };
        window.closeAdminDetail = () => { document.getElementById('adminDetailModal').classList.add('hidden'); state.currentAdminViewUid = null; };
        window.deleteAccount = async (id) => { if (confirm(`刪除 ${id}?`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom_accounts', id)); };
        
        // --- 挑戰模式修復 ---
        window.handleSyncModeChange = (mode) => { const s = document.getElementById('audioVisualSync'), b = document.getElementById('audioBlindMode'); if (mode === 'sync' && s.checked) b.checked = false; if (mode === 'blind' && b.checked) s.checked = false; };
        window.startRangeQuiz = (type) => { if (state.displayedWords.length === 0) return window.showNotification("無單字"); const s = Math.max(1, parseInt(document.getElementById('audioRangeStart').value) || 1), e = Math.min(state.displayedWords.length, parseInt(document.getElementById('audioRangeEnd').value) || 20); state.quizQueue = state.displayedWords.slice(s - 1, e); state.quizType = type; state.quizIndex = 0; document.getElementById('quizModal').classList.remove('hidden'); window.setupQuiz(); };
        window.setupQuiz = () => { const item = state.quizQueue[state.quizIndex]; if (!item) return; document.getElementById('quizZh').innerText = item.zh; document.getElementById('quizProgress').innerText = `${state.quizIndex + 1} / ${state.quizQueue.length}`; document.getElementById('btnNextQuiz').classList.add('hidden'); if (state.quizType === 'block') { document.getElementById('blockQuizContent').classList.remove('hidden'); document.getElementById('dictationQuizContent').classList.add('hidden'); state.quizLetters = item.en.split('').sort(() => Math.random() - 0.5); state.currentAnswer = []; state.usedIndexes = []; window.renderBlockQuiz(); } else { document.getElementById('blockQuizContent').classList.add('hidden'); document.getElementById('dictationQuizContent').classList.remove('hidden'); document.getElementById('quizInput').value = ""; setTimeout(() => document.getElementById('quizInput').focus(), 100); } window.speak(item.en); };
        window.renderBlockQuiz = () => { const item = state.quizQueue[state.quizIndex]; document.getElementById('blockAnswerArea').innerHTML = item.en.split('').map((_, i) => `<div class="answer-slot">${state.currentAnswer[i] || ''}</div>`).join(''); document.getElementById('blockPoolArea').innerHTML = state.quizLetters.map((l, i) => `<button onclick="window.handleQuizBlockClick(${i}, '${l}')" class="block-letter font-bold ${state.usedIndexes.includes(i) ? 'opacity-20 pointer-events-none' : ''}">${l}</button>`).join(''); };
        window.handleQuizBlockClick = (idx, char) => { const target = state.quizQueue[state.quizIndex].en; if (char.toLowerCase() === target[state.currentAnswer.length].toLowerCase()) { state.currentAnswer.push(char); state.usedIndexes.push(idx); window.renderBlockQuiz(); if (state.currentAnswer.length === target.length) { if (state.quizIndex < state.quizQueue.length - 1) document.getElementById('btnNextQuiz').classList.remove('hidden'); else { window.showNotification("挑戰成功！"); setTimeout(window.closeQuiz, 1500); } } } else { const slots = document.querySelectorAll('.answer-slot'); slots[state.currentAnswer.length]?.classList.add('animate-shake', 'text-rose-500'); setTimeout(() => slots[state.currentAnswer.length]?.classList.remove('animate-shake', 'text-rose-500'), 400); } };
        window.checkDictationAnswer = () => { if (document.getElementById('quizInput').value.trim().toLowerCase() === state.quizQueue[state.quizIndex].en.toLowerCase()) { if (state.quizIndex < state.quizQueue.length - 1) document.getElementById('btnNextQuiz').classList.remove('hidden'); else { window.showNotification("正確！"); setTimeout(window.closeQuiz, 1500); } } else { document.getElementById('quizInput').classList.add('animate-shake', 'border-rose-500'); setTimeout(() => document.getElementById('quizInput').classList.remove('animate-shake', 'border-rose-500'), 400); } };
        window.nextQuizItem = () => { state.quizIndex++; window.setupQuiz(); };
        window.closeQuiz = () => { document.getElementById('quizModal').classList.add('hidden'); window.speechSynthesis.cancel(); };
        window.publishGuestLink = () => { if (!state.userLabel) return; const url = `${window.location.origin}${window.location.pathname}?view=guest&id=${state.userLabel}`; const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); window.showNotification("連結已複製！"); };

    </script>
</body>
</html>
