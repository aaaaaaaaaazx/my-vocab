<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字大師 - Eternal Edition 12.5 (全功能修復版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .card-both .word-en, .card-both .word-zh { display: block !important; }
        .card-en .word-en { display: block !important; }
        .card-en .word-zh { display: none !important; }
        .card-zh .word-en { display: none !important; }
        .card-zh .word-zh { display: block !important; }

        .word-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 2px solid #f1f5f9;
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            background: white;
            border-radius: 2rem;
        }
        
        .word-card.playing {
            border-color: #4f46e5 !important;
            box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3);
            transform: scale(1.03);
            background-color: #f5f3ff;
        }
        
        #wordGrid.blind-mode { opacity: 0.05; filter: blur(20px); pointer-events: none; }

        .ui-toggle-btn {
            padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 800; border-radius: 0.75rem;
            transition: all 0.2s ease; border: 2px solid #f1f5f9;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
            cursor: pointer; background: white; color: #64748b;
        }
        .ui-toggle-btn.active { 
            background-color: #4f46e5 !important; 
            color: white !important; 
            border-color: #4f46e5 !important; 
        }

        .review-node {
            flex: 0 0 auto; width: 100px; text-align: center; padding: 12px 8px;
            border-radius: 1.2rem; border: 2px solid #f1f5f9; background: white;
            transition: all 0.2s; cursor: pointer;
        }
        .review-node.done { background: #4f46e5; border-color: #4f46e5; color: white; }
        .review-node.overdue { border-color: #f43f5e; background: #fff1f2; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .answer-slot {
            width: 35px; height: 40px; border-bottom: 3px solid #4f46e5;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px; color: #4f46e5; margin: 0 2px;
        }
        .block-letter {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: white; border: 2px solid #e2e8f0; border-radius: 8px;
            font-weight: 800; font-size: 18px; box-shadow: 0 3px 0 #cbd5e1;
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- 英聽狀態 -->

    <div id="appScreen" class="hidden">

            <div class="flex items-center gap-2">

    <!-- 詳情 Modal -->
    <div id="adminDetailModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60">
        <div class="bg-white w-full max-w-2xl rounded-[2rem] max-h-[80vh] flex flex-col font-bold">
            <div class="p-6 border-b flex justify-between items-center">
                <h4 id="detailUserTitle">學生數據</h4>
                <button onclick="window.closeAdminDetail()"><i data-lucide="x"></i></button>
            </div>
            <div class="p-4 bg-indigo-50 border-b flex gap-2">
                <select id="sourceAccountSelect" onchange="window.updateSourceUnitList()" class="flex-1 p-2 border rounded-lg text-sm"></select>

    <div id="notification" class="fixed bottom-10 right-10 opacity-0 transition-all duration-500 bg-slate-800 text-white px-6 py-3 rounded-2xl z-[300] font-bold"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDYxUj8FG0KCQIkuBZNjqENH9K8aLDHsYQ", authDomain: "my-vocab-app-852b4.firebaseapp.com", projectId: "my-vocab-app-852b4", storageBucket: "my-vocab-app-852b4.firebasestorage.app", messagingSenderId: "79896462245", appId: "1:79896462245:web:1ece173ddc5a6d05781e4c", measurementId: "G-HSMRF8W6SW" };
        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const state = { 
            units: [], folders: [], activeUnitId: null, globalMode: 'both', userLabel: null,
            isAudioPlaying: false, isPaused: false, displayedWords: [], 
            showSyllables: false, showVowels: false, showRating: false, showNote: false,
            openFolders: new Set(), allUnitsCache: [], quizQueue: [], quizIndex: 0, currentAnswer: []
        };

        // --- 音節切割邏輯 ---
        function getSyllables(word) {
            word = word.toLowerCase().trim();
            if (word.length <= 3) return [word];
            const vowels = "aeiouy";
            const isV = (c) => vowels.includes(c);
            let res = [], cur = "";
            for (let i = 0; i < word.length; i++) {
                cur += word[i];
                if (isV(word[i])) {
                    if (i + 1 < word.length && isV(word[i+1])) continue; // 組合母音
                    if (i === word.length - 1 && word[i] === 'e') break; // 字尾不發音e
                    let hasMoreV = false;
                    for (let j = i + 1; j < word.length; j++) if (isV(word[j])) hasMoreV = true;
                    if (hasMoreV) {
                        let split = i + 1;
                        if (i + 2 < word.length && !isV(word[i+1]) && !isV(word[i+2])) split = i + 2;
                        res.push(cur + word.substring(i+1, split));
                        cur = ""; i = split - 1;
                    }
                }
            }
            cur && res.push(cur + (word.endsWith('e') && !isV(word[word.length-2]) ? 'e' : ''));
            return res.length ? res : [word];
        }

        window.highlightText = (t) => {
            let syl = state.showSyllables ? getSyllables(t) : [t];
            let p = syl.join('·');
            if (state.showVowels) p = p.replace(/[aeiouAEIOU]/g, m => `<span class="text-rose-600">${m}</span>`);
            return p;
        };

        window.renderWords = () => {
            const g = document.getElementById('wordGrid'), u = state.units.find(x => x.id == state.activeUnitId);
            if (!u || !g) return;
            let list = [...(u.words || [])], sort = document.getElementById('sortSelect').value;
            if (sort === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
            else if (sort === 'random') list.sort(() => Math.random() - 0.5);
            state.displayedWords = list;
            
            const updateBtn = (id, act) => { const b = document.getElementById(id); b && (act ? b.classList.add('active') : b.classList.remove('active')); };
            ['both','en','zh'].forEach(m => updateBtn(`btn-${m}`, state.globalMode === m));
            ['syllables', 'vowels', 'rating', 'note'].forEach(f => updateBtn(`toggle-${f}-btn`, state['show'+f.charAt(0).toUpperCase()+f.slice(1)]));

            g.innerHTML = list.map((w, idx) => `<div class="word-card card-${w.localMode || state.globalMode}" onclick="window.speak('${w.en}')">
                <div class="flex justify-between items-start mb-4">
                    <div><h4 class="word-en text-xl font-black">${window.highlightText(w.en)}</h4><p class="word-zh text-indigo-600 text-sm font-bold">${w.zh}</p></div>
                    <button onclick="event.stopPropagation(); window.cycleMode('${w.id}')" class="card-mode-toggle"><span>切換</span></button>
                </div>
                ${state.showRating ? `<div class="flex gap-1 mt-auto">${[1,2,3,4,5].map(n => `<button onclick="event.stopPropagation(); window.updateRating('${w.id}',${n})" class="rate-btn ${w.rating==n?'rate-'+n:'bg-slate-100 text-slate-400'}">${n}</button>`).join('')}</div>` : ''}
                ${state.showNote ? `<textarea class="note-field mt-2" onblur="window.updateNote('${w.id}',this.value)">${w.note||''}</textarea>` : ''}
            </div>`).join('');
            lucide.createIcons();
        };

        window.renderUnitList = () => {
            const container = document.getElementById('unitTreeList'); if (!container) return;
            let html = "";
            state.folders.forEach(f => {
                const open = state.openFolders.has(f.id);
                const uS = state.units.filter(u => u.folderId === f.id);
                html += `<div class="mb-1"><div class="folder-header" onclick="window.toggleFolder('${f.id}')"><span>${f.name}</span><i data-lucide="chevron-${open?'down':'right'}" class="w-3 h-3"></i></div>
                    ${open ? `<div class="folder-content">${uS.map(u => `<div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId==u.id?'active':''}">${u.name}</div>`).join('')}</div>` : ''}</div>`;
            });
            const unc = state.units.filter(u => !u.folderId);
            html += unc.map(u => `<div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId==u.id?'active':''}">${u.name}</div>`).join('');
            container.innerHTML = html; lucide.createIcons();
        };

        // --- 初始化驗證與同步 ---
        onAuthStateChanged(auth, async (user) => {
            const params = new URLSearchParams(window.location.search);
            const isGuest = params.get('view') === 'guest', gid = params.get('id');
            if (!user) { await signInAnonymously(auth); return; }
            if (isGuest && gid) { state.userLabel = gid; state.isGuestMode = true; window.showAppUI("訪客模式"); syncData(); }
            else if (sessionStorage.getItem('admin_session')) { state.userLabel = 'yljh'; window.showAdminDashboard(); syncData(); }
            else if (sessionStorage.getItem('custom_user_session')) { state.userLabel = sessionStorage.getItem('custom_user_session'); window.showAppUI(state.userLabel); syncData(); }
            else document.getElementById('authScreen').classList.remove('hidden');
            lucide.createIcons();
        });

        function syncData() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'folders'), snap => {
                state.folders = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(f => f.ownerId === state.userLabel);
                window.renderUnitList();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), snap => {
                state.units = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(u => u.ownerId === state.userLabel);
                if (!state.activeUnitId && state.units.length) state.activeUnitId = state.units[0].id;
                window.renderUnitList(); window.renderWords();
            });
        }

        // --- 登入函式 ---
        window.loginWithCustom = async () => {
            const u = document.getElementById('customUser').value.trim(), p = document.getElementById('customPass').value.trim();
            if (!u || !p) return;
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom_accounts', u));
                if (snap.exists() && snap.data().password === p) {
                    sessionStorage.setItem('custom_user_session', u); location.reload();
                } else alert("帳密錯誤");
            } catch(e) { alert("連線失敗"); }
        };

        window.adminLogin = () => {
            const u = document.getElementById('adminUser').value.trim(), p = document.getElementById('adminPass').value.trim();
            if (u === 'yljh' && p === 'yljh8320873') { sessionStorage.setItem('admin_session', 'true'); location.reload(); }
            else alert("驗證失敗");
        };

        // --- 其他全域函式 ---
        window.toggleAuthView = (m) => { ['loginMainView', 'customLoginView', 'adminLoginView'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(m + (m==='main'?'':'LoginView')).classList.remove('hidden'); lucide.createIcons(); };
        window.logout = () => { signOut(auth); sessionStorage.clear(); location.href = location.pathname; };
        window.showAppUI = (n) => { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); document.getElementById('userNameDisplay').innerText = n; };
        window.showAdminDashboard = () => {
            document.getElementById('appScreen').classList.add('hidden'); document.getElementById('adminScreen').classList.remove('hidden');
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'custom_accounts'), snap => {
                document.getElementById('adminUserTable').innerHTML = snap.docs.map(d => `<tr class="border-b"><td>${d.id}</td><td class="text-right"><button onclick="window.adminDetail('${d.id}','${d.id}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs">詳情</button></td></tr>`).join('');
                document.getElementById('sourceAccountSelect').innerHTML = `<option value="yljh">管理者模板</option>` + snap.docs.map(d => `<option value="${d.id}">${d.id}</option>`).join('');
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), snap => { state.allUnitsCache = snap.docs.map(d => ({id: d.id, ...d.data()})); window.updateSourceUnitList(); });
        };
        window.updateSourceUnitList = () => {
            const src = document.getElementById('sourceAccountSelect').value;
            const fil = state.allUnitsCache.filter(u => u.ownerId === src);
            document.getElementById('masterUnitSelect').innerHTML = fil.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        };
        window.assignUnitToStudent = async () => {
            const uid = document.getElementById('masterUnitSelect').value, target = state.currentAdminViewUid;
            if (!uid || !target) return;
            const src = state.allUnitsCache.find(u => u.id === uid);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', 'u'+Date.now()), { ...src, ownerId: target, reviewProgress: {} });
            window.showNotification("已分派單元");
        };
        window.adminDetail = async (uid, n) => { state.currentAdminViewUid = uid; document.getElementById('adminDetailModal').classList.remove('hidden'); document.getElementById('detailUserTitle').innerText = n; const fil = state.allUnitsCache.filter(u => u.ownerId === uid); document.getElementById('detailContent').innerHTML = fil.map(u => `<div class="p-3 bg-white border rounded-lg">${u.name}</div>`).join('') || '無資料'; };
        window.closeAdminDetail = () => document.getElementById('adminDetailModal').classList.add('hidden');
        window.setGlobalMode = (m) => { state.globalMode = m; window.renderWords(); };
        window.toggleFeature = (f) => { state['show'+f.charAt(0).toUpperCase()+f.slice(1)] = !state['show'+f.charAt(0).toUpperCase()+f.slice(1)]; window.renderWords(); };
        window.setActiveUnit = (id) => { state.activeUnitId = id; window.renderWords(); window.renderUnitList(); };
        window.cycleMode = (id) => { const u = state.units.find(x => x.id == state.activeUnitId), w = u.words.find(x => x.id == id); const cur = w.localMode || state.globalMode; w.localMode = cur === 'both' ? 'en' : cur === 'en' ? 'zh' : 'both'; window.renderWords(); };
        window.updateRating = async (id, n) => { if(state.isGuestMode) return; const u = state.units.find(x => x.id == state.activeUnitId); const w = u.words.find(x => x.id == id); w.rating = n; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', state.activeUnitId), { words: u.words }); window.renderWords(); };
        window.importWords = async () => { const n = document.getElementById('unitNameInput').value.trim(), t = document.getElementById('wordsInput').value.trim(); if(!n || !t) return; const words = t.split('\n').map(l => { const p = l.split(/[,，]/); return p.length >= 2 ? { id: 'w'+Date.now()+Math.random(), en: p[0].trim(), zh: p[1].trim(), rating: 3 } : null; }).filter(x => x); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', 'u'+Date.now()), { name: n, words, ownerId: state.userLabel }); document.getElementById('unitNameInput').value = ''; document.getElementById('wordsInput').value = ''; };
        window.showNotification = (t) => { const el = document.getElementById('notification'); el.innerText = t; el.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000); };
        window.publishGuestLink = () => { const url = `${window.location.origin}${window.location.pathname}?view=guest&id=${state.userLabel}`; const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); window.showNotification("連結已複製"); };
        window.toggleFolder = (id) => { state.openFolders.has(id) ? state.openFolders.delete(id) : state.openFolders.add(id); window.renderUnitList(); };
        window.createNewFolder = async () => { const n = prompt("資料夾名稱："); if(n) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'folders', 'f'+Date.now()), { name: n, ownerId: state.userLabel }); };
        window.startAutoPlay = async () => { if(state.isAudioPlaying) return; const s = parseInt(document.getElementById('audioRangeStart').value)-1, e = parseInt(document.getElementById('audioRangeEnd').value); const list = state.displayedWords.slice(s, e); if(!list.length) return; state.isAudioPlaying = true; document.getElementById('floatingAudioBar').classList.replace('opacity-0','opacity-100'); document.getElementById('floatingAudioBar').classList.remove('pointer-events-none'); for(let w of list) { if(!state.isAudioPlaying) break; document.getElementById('floatingStatusText').innerText = w.en; window.speak(w.en); await new Promise(r => setTimeout(r, 2500)); } window.stopAutoPlay(); };
        window.stopAutoPlay = () => { state.isAudioPlaying = false; document.getElementById('floatingAudioBar').classList.replace('opacity-100','opacity-0'); document.getElementById('floatingAudioBar').classList.add('pointer-events-none'); };
        window.togglePause = () => { state.isPaused = !state.isPaused; state.isPaused ? window.speechSynthesis.pause() : window.speechSynthesis.resume(); };
        window.startRangeQuiz = (type) => { const s = parseInt(document.getElementById('audioRangeStart').value)-1, e = parseInt(document.getElementById('audioRangeEnd').value); state.quizQueue = state.displayedWords.slice(s, e); if(!state.quizQueue.length) return; state.quizType = type; state.quizIndex = 0; document.getElementById('quizModal').classList.remove('hidden'); window.setupQuiz(); };
        window.setupQuiz = () => { const item = state.quizQueue[state.quizIndex]; document.getElementById('quizZh').innerText = item.zh; document.getElementById('quizProgress').innerText = `${state.quizIndex+1}/${state.quizQueue.length}`; document.getElementById('btnNextQuiz').classList.add('hidden'); if(state.quizType==='block'){ document.getElementById('blockQuizContent').classList.remove('hidden'); document.getElementById('dictationQuizContent').classList.add('hidden'); state.quizLetters = item.en.split('').sort(()=>Math.random()-0.5); state.currentAnswer = []; state.usedIndexes = []; window.renderBlockQuiz(); } else { document.getElementById('blockQuizContent').classList.add('hidden'); document.getElementById('dictationQuizContent').classList.remove('hidden'); document.getElementById('quizInput').value=""; } window.speak(item.en); };
        window.renderBlockQuiz = () => { const item = state.quizQueue[state.quizIndex]; document.getElementById('blockAnswerArea').innerHTML = item.en.split('').map((_,i)=>`<div class="answer-slot">${state.currentAnswer[i]||''}</div>`).join(''); document.getElementById('blockPoolArea').innerHTML = state.quizLetters.map((l,i)=>`<button onclick="window.handleQuizBlockClick(${i},'${l}')" class="block-letter ${state.usedIndexes.includes(i)?'opacity-20 pointer-events-none':''}">${l}</button>`).join(''); };
        window.handleQuizBlockClick = (i, c) => { const target = state.quizQueue[state.quizIndex].en; if(c.toLowerCase() === target[state.currentAnswer.length].toLowerCase()) { state.currentAnswer.push(c); state.usedIndexes.push(i); window.renderBlockQuiz(); if(state.currentAnswer.length === target.length) (state.quizIndex < state.quizQueue.length-1) ? document.getElementById('btnNextQuiz').classList.remove('hidden') : setTimeout(window.closeQuiz, 1000); } };
        window.checkDictationAnswer = () => { if(document.getElementById('quizInput').value.trim().toLowerCase() === state.quizQueue[state.quizIndex].en.toLowerCase()) { (state.quizIndex < state.quizQueue.length-1) ? document.getElementById('btnNextQuiz').classList.remove('hidden') : setTimeout(window.closeQuiz, 1000); } };
        window.nextQuizItem = () => { state.quizIndex++; window.setupQuiz(); };
        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');
    </script>
</body>
</html>
