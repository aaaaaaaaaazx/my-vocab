<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字大師 - Eternal Edition 16.7 (訪客唯讀版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 模式控制：中英、僅英、僅中 */
        .card-both .word-en, .card-both .word-zh { display: block !important; }
        .card-en .word-en { display: block !important; }
        .card-en .word-zh { display: none !important; }
        .card-zh .word-en { display: none !important; }
        .card-zh .word-zh { display: block !important; }

        .word-card { 
            transition: border 0.3s, transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid #f1f5f9;
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            background: white;
            border-radius: 2rem;
        }
        
        .word-card.playing {
            border-color: #4f46e5 !important;
            box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3);
            transform: scale(1.03);
            background-color: #f5f3ff;
        }
        
        #wordGrid.blind-mode { opacity: 0.05; filter: blur(20px); pointer-events: none; }

        .ui-toggle-btn {
            padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 800; border-radius: 0.75rem;
            transition: all 0.2s ease; border: 2px solid #f1f5f9;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem;
            white-space: nowrap; cursor: pointer; background: white;
            color: #64748b;
        }
        .ui-toggle-btn.active { 
            background-color: #4f46e5 !important; 
            color: white !important; 
            border-color: #4f46e5 !important; 
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); 
        }

        .card-mode-toggle {
            position: absolute; top: 15px; right: 15px;
            padding: 5px 12px; background: #f8fafc;
            border-radius: 99px; display: flex; align-items: center;
            justify-content: center; gap: 4px;
            color: #6366f1; transition: all 0.2s;
            border: 1.5px solid #e2e8f0; z-index: 30;
        }
        .card-mode-toggle:hover { background: #eff6ff; border-color: #3b82f6; }
        .card-mode-toggle span { font-size: 10px; font-weight: 800; }

        .rate-btn { transition: all 0.2s; width: 32px; height: 32px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        .rate-1 { background-color: #059669 !important; color: white; }
        .rate-2 { background-color: #10b981 !important; color: white; }
        .rate-3 { background-color: #f59e0b !important; color: white; }
        .rate-4 { background-color: #f97316 !important; color: white; }
        .rate-5 { background-color: #ef4444 !important; color: white; }

        /* 記憶曲線 */
        .review-node {
            flex: 0 0 auto; width: 110px; text-align: center; padding: 14px 8px;
            border-radius: 1.5rem; border: 2px solid #f1f5f9; background: white;
            transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .review-node.done { background: #4f46e5; border-color: #4f46e5; color: white; }
        .review-node.overdue { border-color: #f43f5e; background: #fff1f2; animation: border-pulse 1.5s infinite; }
        .review-node.upcoming { border-color: #e2e8f0; color: #94a3b8; }
        @keyframes border-pulse { 0% { border-color: #f43f5e; } 50% { border-color: #fda4af; } 100% { border-color: #f43f5e; } }
        
        #reviewNodes::-webkit-scrollbar, #unitTreeList::-webkit-scrollbar { height: 8px; width: 6px; }
        #reviewNodes::-webkit-scrollbar-thumb, #unitTreeList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .folder-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; background: #f8fafc; border-radius: 1rem;
            cursor: pointer; transition: all 0.2s; font-weight: 800; color: #475569;
            margin-bottom: 0.25rem;
        }
        .folder-content { padding-left: 0.75rem; border-left: 2px solid #e2e8f0; margin-left: 1rem; margin-bottom: 0.75rem; }
        .unit-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 0.8rem; border-radius: 0.75rem; transition: all 0.2s;
            cursor: pointer; margin-bottom: 0.25rem; font-size: 0.85rem; font-weight: 700;
        }
        .unit-item.active { background: #4f46e5 !important; color: white !important; }

        .answer-slot {
            width: 40px; height: 45px; border-bottom: 3px solid #4f46e5;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; color: #4f46e5; margin: 0 2px;
        }
        .block-letter {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            background: white; border: 2px solid #e2e8f0; border-radius: 10px;
            font-weight: 900; font-size: 18px; box-shadow: 0 3px 0 #cbd5e1;
            cursor: pointer;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- 英聽狀態條 -->
    <div id="floatingAudioBar" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] w-[92%] max-w-lg bg-white/95 backdrop-blur-xl border border-indigo-100 shadow-2xl rounded-full p-4 flex items-center justify-between opacity-0 pointer-events-none transition-all duration-500">
        <div class="flex items-center gap-4 pl-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg text-white"><i data-lucide="headphones" class="w-5 h-5"></i></div>
            <div>
                <p class="text-[10px] font-black text-indigo-600 uppercase">英聽練習中</p>
                <p id="floatingStatusText" class="text-sm font-black text-slate-700">準備中...</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.togglePause()" class="p-3 bg-indigo-50 text-indigo-600 rounded-full border border-indigo-100"><i data-lucide="pause" id="pauseIcon" class="w-5 h-5"></i></button>
            <button onclick="window.stopAutoPlay()" class="p-3 bg-rose-500 text-white rounded-full shadow-lg"><i data-lucide="square" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- 1. 登入畫面 -->
    <div id="authScreen" class="hidden flex items-center justify-center min-h-screen p-4 text-center">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-100">
            <div id="loginMainView">
                <div class="mb-8">
                    <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl"><i data-lucide="graduation-cap" class="text-white w-10 h-10"></i></div>
                    <h1 class="text-3xl font-black text-slate-800 mb-1">單字大師</h1>
                    <p class="text-slate-400 font-medium italic text-xs">Eternal Edition 16.7</p>
                </div>
                <div class="space-y-4">
                    <button onclick="window.toggleAuthView('custom')" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 hover:bg-black transition-all"><i data-lucide="user" class="w-5 h-5 text-white"></i> 使用帳號登入</button>
                    <button onclick="window.toggleAuthView('admin')" class="w-full border-2 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-bold">管理者模式</button>
                </div>
            </div>
            
            <div id="customLoginView" class="hidden text-left">
                <button onclick="window.toggleAuthView('main')" class="text-slate-400 mb-6 flex items-center gap-1 text-xs font-black"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回</button>
                <h2 class="text-2xl font-bold mb-6 text-slate-800">學生登入</h2>
                <div class="space-y-4">
                    <input type="text" id="customUser" placeholder="帳號 ID" class="w-full px-5 py-4 bg-slate-50 border-2 rounded-xl focus:border-indigo-500 outline-none">
                    <input type="password" id="customPass" placeholder="密碼" class="w-full px-5 py-4 bg-slate-50 border-2 rounded-xl focus:border-indigo-500 outline-none">
                    <button onclick="window.loginWithCustom()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg">確認進入</button>
                </div>
            </div>

            <div id="adminLoginView" class="hidden text-left">
                <button onclick="window.toggleAuthView('main')" class="text-slate-400 mb-6 flex items-center gap-1 text-sm font-black"><i data-lucide="arrow-left" class="w-4 h-4"></i> 返回</button>
                <h2 class="text-2xl font-black mb-6 text-slate-800">管理中心</h2>
                <div class="space-y-4">
                    <input type="text" id="adminUser" placeholder="管理員 ID" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none">
                    <input type="password" id="adminPass" placeholder="管理密碼" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none">
                    <button onclick="window.adminLogin()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg">授權進入</button>
                </div>
            </div>
            <div id="loadingIndicator" class="hidden mt-6 text-sm text-slate-400 flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><span>核心同步中...</span></div>
        </div>
    </div>

    <!-- 2. 主介面 -->
    <div id="appScreen" class="hidden">
        <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 h-20 flex items-center justify-between px-6 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg text-white"><i data-lucide="graduation-cap" class="w-6 h-6"></i></div>
                <span class="text-xl font-black text-slate-800 uppercase tracking-tighter">單字大師</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="btnBackToAdmin" onclick="window.showAdminDashboard()" class="hidden bg-slate-800 text-white px-4 py-2 rounded-xl text-xs">管理者後台</button>
                <button id="btnPublishGuest" onclick="window.publishGuestLink()" class="flex items-center gap-2 bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-xs border border-emerald-100 hover:bg-emerald-100 transition-all font-bold"><i data-lucide="share-2" class="w-4 h-4"></i> 發佈連結</button>
                <span id="userNameDisplay" class="text-xs text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full border font-bold"></span>
                <button onclick="window.logout()" class="text-xs font-black text-rose-500 hover:bg-rose-50 px-3 py-1.5 rounded-lg">登出</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 側邊欄 -->
            <aside class="lg:col-span-4 space-y-6">
                <div id="addUnitSection" class="settings-card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold flex items-center gap-2 text-slate-800"><i data-lucide="layers" class="text-indigo-600 w-5 h-5"></i> 課程管理</h2>
                        <button onclick="window.createNewFolder()" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-all"><i data-lucide="folder-plus" class="w-4 h-4"></i></button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="unitNameInput" placeholder="新單元名稱" class="w-full px-4 py-2 bg-slate-50 border-2 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold">
                        <textarea id="wordsInput" placeholder="格式: 單字,定義 (每行一組)" rows="3" class="w-full px-4 py-2 bg-slate-50 border-2 rounded-xl outline-none focus:border-indigo-500 text-sm font-bold"></textarea>
                        <button onclick="window.importWords()" class="w-full py-3 bg-indigo-600 text-white font-black rounded-xl shadow-md">儲存單元</button>
                    </div>
                </div>
                <div class="settings-card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">單元目錄</h2>
                        <button onclick="window.showAllNotes()" class="text-[10px] bg-amber-50 border border-amber-200 text-amber-600 px-2 py-1 rounded-md hover:bg-amber-100 transition-all flex items-center gap-1 shadow-sm font-bold">
                            <i data-lucide="book-open-check" class="w-3 h-3"></i> 彙整筆記
                        </button>
                    </div>
                    <div id="unitTreeList" class="space-y-2 max-h-[500px] overflow-y-auto pr-1"></div>
                </div>
            </aside>
            
            <!-- 主內容 -->
            <section class="lg:col-span-8 space-y-6">
                <div class="settings-card space-y-6">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black text-slate-400 uppercase mr-2">顯示模式</span>
                            <div class="flex bg-slate-100 p-1 rounded-xl">
                                <button onclick="window.setGlobalMode('both')" class="ui-toggle-btn" id="btn-both">中英</button>
                                <button onclick="window.setGlobalMode('en')" class="ui-toggle-btn ml-1" id="btn-en">英文</button>
                                <button onclick="window.setGlobalMode('zh')" class="ui-toggle-btn ml-1" id="btn-zh">中文</button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button id="toggle-syllables-btn" onclick="window.toggleFeature('syllables')" class="ui-toggle-btn font-bold">音節</button>
                            <button id="toggle-vowels-btn" onclick="window.toggleFeature('vowels')" class="ui-toggle-btn font-bold">母音</button>
                            <button id="toggle-rating-btn" onclick="window.toggleFeature('rating')" class="ui-toggle-btn font-bold">掌握度</button>
                            <button id="toggle-note-btn" onclick="window.toggleFeature('note')" class="ui-toggle-btn font-bold">筆記</button>
                        </div>
                    </div>

                    <div class="border-t pt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div class="flex flex-wrap items-center gap-3">
                                <div class="flex items-center gap-2 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-100 text-amber-700 font-bold">
                                    <span class="text-[10px]">範圍</span>
                                    <input type="number" id="audioRangeStart" value="1" min="1" class="w-8 bg-transparent text-center outline-none">
                                    <span>~</span>
                                    <input type="number" id="audioRangeEnd" value="20" min="1" class="w-8 bg-transparent text-center outline-none">
                                </div>
                                <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-xl border border-indigo-100 text-indigo-700 font-bold">
                                    <span class="text-[10px]">次數</span>
                                    <input type="number" id="playCountInput" value="2" min="1" max="10" class="w-8 bg-transparent text-center outline-none">
                                    <span>|</span>
                                    <span class="text-[10px]">間隔(秒)</span>
                                    <input type="number" id="playIntervalInput" value="2" min="1" max="10" class="w-8 bg-transparent text-center outline-none">
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 font-black">
                            <button onclick="window.startAutoPlay()" class="py-3 bg-indigo-600 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center hover:bg-indigo-700 transition-all"><i data-lucide="play" class="w-5 h-5 mb-1"></i>英聽</button>
                            <button onclick="window.startRangeQuiz('block')" class="py-3 bg-amber-500 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center hover:bg-amber-600 transition-all"><i data-lucide="layout-grid" class="w-5 h-5 mb-1"></i>積木</button>
                            <button onclick="window.startRangeQuiz('dictation')" class="py-3 bg-rose-500 text-white rounded-2xl text-[10px] shadow-lg flex flex-col items-center justify-center hover:bg-rose-600 transition-all"><i data-lucide="keyboard" class="w-5 h-5 mb-1"></i>聽寫</button>
                        </div>
                    </div>
                </div>

                <!-- 記憶曲線 -->
                <div id="reviewTrackingArea" class="settings-card">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
                        <div class="flex flex-col">
                            <h4 class="text-sm font-black text-slate-800 flex items-center gap-2"><i data-lucide="brain" class="text-indigo-600 w-4 h-4"></i> 記憶曲線追蹤</h4>
                            <p id="reviewSummary" class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter font-bold">點擊節點標記完成</p>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border font-bold">
                            <span class="text-[10px] text-slate-400 font-black">起始:</span>
                            <input type="date" id="baseDateInput" onchange="window.updateBaseDateTime()" class="bg-transparent text-xs outline-none text-slate-600 cursor-pointer">
                            <input type="time" id="baseTimeInput" onchange="window.updateBaseDateTime()" class="bg-transparent text-xs outline-none text-slate-600 cursor-pointer">
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden"><div id="reviewProgressBar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div></div>
                    <div id="reviewNodes" class="flex flex-nowrap gap-3 overflow-x-auto pb-4 pt-2"></div>
                </div>

                <!-- 搜尋列與排序整合區塊 -->
                <div class="flex flex-wrap justify-between items-end px-2 gap-4">
                    <h3 id="activeUnitTitle" class="text-2xl font-black italic text-slate-800">請選單元</h3>
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchInput" oninput="window.handleSearch()" placeholder="全單字本搜尋..." class="pl-9 pr-3 py-1.5 bg-white border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none text-sm transition-all w-36 focus:w-48 text-slate-700 shadow-sm font-bold">
                        </div>
                        <select id="sortSelect" onchange="window.handleSortChange()" class="bg-transparent text-sm border-b-2 border-indigo-500 text-indigo-600 pb-1 outline-none font-bold">
                            <option value="original">原始順序</option>
                            <option value="random">隨機</option>
                            <option value="az">A-Z</option>
                            <option value="rating">掌握度</option>
                            <option value="starred">不熟 (星星)</option>
                        </select>
                    </div>
                </div>

                <div id="wordGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20 mt-4"></div>
            </section>
        </main>
    </div>

    <!-- 管理者頁面 -->
    <div id="adminScreen" class="hidden bg-slate-50 min-h-screen pb-10 text-slate-800">
        <nav class="bg-slate-900 text-white h-20 flex items-center justify-between px-8 sticky top-0 z-50 shadow-lg">
            <span class="font-black tracking-widest uppercase text-xl text-indigo-400">YLJH 管理系統</span>
            <div class="flex gap-4">
                <button onclick="window.switchToAppMode()" class="bg-indigo-600 px-4 py-2 rounded-xl text-sm font-bold">模板製作</button>
                <button onclick="window.logout()" class="bg-white/10 px-4 py-2 rounded-xl text-sm font-bold">登出</button>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-8 py-10">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="settings-card text-center">
                    <h3 class="text-xl font-black mb-6">建立學生帳號</h3>
                    <div class="space-y-4">
                        <input type="text" id="newAccountUser" placeholder="帳號 ID" class="w-full px-4 py-2.5 bg-slate-50 border rounded-xl font-bold">
                        <input type="text" id="newAccountPass" placeholder="初始密碼" class="w-full px-4 py-2.5 bg-slate-50 border rounded-xl font-bold">
                        <button onclick="window.createAccount()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">發布帳號</button>
                    </div>
                </div>
                <div class="lg:col-span-2 settings-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest border-b">
                            <tr><th class="px-6 py-4">帳號 ID</th><th class="px-6 py-4 text-right pr-12">操作</th></tr>
                        </thead>
                        <tbody id="adminUserTable" class="text-sm font-bold"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="wordEditModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl p-8">
            <h4 class="text-xl font-black mb-6 text-slate-800">修改單字內容</h4>
            <div class="space-y-4">
                <input type="text" id="editWordEn" placeholder="英文單字" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500 font-bold">
                <input type="text" id="editWordZh" placeholder="中文定義" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500 font-bold">
                <div class="flex gap-3 pt-2">
                    <button onclick="window.closeWordEdit()" class="flex-1 py-3 bg-slate-100 rounded-xl text-slate-500 font-bold">取消</button>
                    <button onclick="window.saveWordEdit()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="moveFolderModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl p-8">

            <div class="flex justify-center gap-3 mt-4 mb-6">
                <!-- 🚀 呈現/隱藏單字切換按鈕 -->
                <button id="btnRevealWord" onclick="window.toggleQuizWord()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm transition-all flex items-center gap-1 hover:bg-slate-200 font-bold"><i data-lucide="eye" class="w-4 h-4"></i> 呈現單字</button>
                <button id="btnMarkUnfam" onclick="window.markQuizUnfamiliar()" class="px-4 py-2 bg-slate-100 text-slate-500 rounded-xl text-sm hover:bg-amber-50 hover:text-amber-500 transition-all flex items-center gap-1 font-bold"><i data-lucide="star" class="w-4 h-4"></i> 標註不熟</button>

            <div id="blockQuizContent" class="hidden">
                <div id="blockAnswerArea" class="flex flex-wrap justify-center gap-2 mb-10 min-h-[50px]"></div>

                <button onclick="window.checkDictationAnswer()" class="w-full py-5 bg-rose-500 text-white rounded-2xl font-black">檢查</button>
            </div>
            <div class="mt-8"><button onclick="window.nextQuizItem()" id="btnNextQuiz" class="hidden px-10 py-3 bg-emerald-500 text-white rounded-2xl font-black">下一題</button></div>

    <div id="notification" class="fixed bottom-10 right-10 transform translate-y-20 opacity-0 transition-all duration-500 bg-slate-900 text-white px-8 py-4 rounded-[2rem] shadow-2xl z-[400] flex items-center gap-3 border border-white/10"><i data-lucide="bell" class="w-4 h-4 text-indigo-400"></i><span id="notificationText" class="font-bold"></span></div>

    <!-- Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDYxUj8FG0KCQIkuBZNjqENH9K8aLDHsYQ", authDomain: "my-vocab-app-852b4.firebaseapp.com", projectId: "my-vocab-app-852b4", storageBucket: "my-vocab-app-852b4.firebasestorage.app", messagingSenderId: "79896462245", appId: "1:79896462245:web:1ece173ddc5a6d05781e4c", measurementId: "G-HSMRF8W6SW" };
        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const STAGES = [
            { id: "s1", name: "第一次", offsetH: 0, label: "立即" }, { id: "s2", name: "第二次", offsetH: 0.5, label: "30分" }, { id: "s3", name: "第三次", offsetH: 12, label: "12時" },
            { id: "d1", name: "第四次", offsetH: 24, label: "1天" }, { id: "d2", name: "第五次", offsetH: 48, label: "2天" }, { id: "d4", name: "第六次", offsetH: 96, label: "4天" },
            { id: "d7", name: "第七次", offsetH: 168, label: "7天" }, { id: "d15", name: "第八次", offsetH: 360, label: "15天" },
            { id: "m1", name: "第九次", offsetH: 720, label: "1月" }, { id: "m3", name: "第十次", offsetH: 2160, label: "3月" }, { id: "m6", name: "第十一次", offsetH: 4320, label: "6月" }
        ];

        const state = { 
            units: [], folders: [], activeUnitId: null, globalMode: 'both', userLabel: null,
            isAudioPlaying: false, isPaused: false, displayedWords: [], baseSortedWords: [], lastUnitId: null,
            showSyllables: false, showVowels: false, showRating: false, showNote: false,
            openFolders: new Set(), allUnitsCache: [], isGuestMode: false,
            quizQueue: [], quizIndex: 0, currentAnswer: [], usedIndexes: [],
            showAllNotesMode: false,
            isRevealed: false, savedAnswer: null, savedUsedIndexes: null // 🚀 記錄顯示狀態
        };

        // --- 音節切割 ---
        function getSyllables(word) {
            word = word.toLowerCase().trim();
            if (word.length <= 3) return [word];
            const vowels = "aeiouy";
            const isV = (c) => vowels.includes(c);
            let res = [], cur = "";
            for (let i = 0; i < word.length; i++) {
                cur += word[i];
                if (isV(word[i])) {
                    if (i + 1 < word.length && isV(word[i+1])) continue;
                    let hasMoreV = false;
                    for (let j = i + 1; j < word.length; j++) if (isV(word[j])) hasMoreV = true;
                    if (hasMoreV) {
                        let split = i + 1;
                        if (i + 2 < word.length && !isV(word[i+1]) && !isV(word[i+2])) split = i + 2;
                        else if (i + 1 < word.length && !isV(word[i+1])) split = i + 1;
                        res.push(cur + word.substring(i+1, split));
                        cur = ""; i = split - 1;
                    }
                }
            }
            if (cur) res.push(cur);
            return res.length ? res : [word];
        }

        window.highlightText = (t) => {
            let syl = state.showSyllables ? getSyllables(t) : [t];
            let p = syl.join('·');
            if (state.showVowels) p = p.replace(/[aeiouAEIOU]/g, m => `<span class="text-rose-600 font-bold">${m}</span>`);
            return p;
        };

        window.speak = (t) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'en-US'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        };

        // --- 核心渲染與搜尋過濾 ---
        window.handleSearch = () => { window.renderWords(false); };
        window.handleSortChange = () => { window.renderWords(true); };

        window.showAllNotes = () => {
            state.showAllNotesMode = true;
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            window.renderWords(true);
        };

        window.renderWords = (forceSort = true) => {
            const g = document.getElementById('wordGrid');
            const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
            const sortVal = document.getElementById('sortSelect').value;
            
            if (state.showAllNotesMode) {
                if (forceSort || state.lastUnitId !== 'ALL_NOTES') {
                    state.lastUnitId = 'ALL_NOTES';
                    let allNotes = [];
                    state.units.forEach(u => {
                        (u.words || []).forEach(w => {
                            if (w.note && w.note.trim() !== '') {
                                allNotes.push({ ...w, _unitId: u.id, _unitName: u.name });
                            }
                        });
                    });
                    
                    if (sortVal === 'az') allNotes.sort((a,b) => a.en.localeCompare(b.en));
                    else if (sortVal === 'random') allNotes.sort(() => Math.random() - 0.5);
                    else if (sortVal === 'rating') allNotes.sort((a,b) => b.rating - a.rating);
                    else if (sortVal === 'starred') allNotes.sort((a,b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));
                    
                    state.baseSortedWords = allNotes;
                } else {
                    let updatedBase = state.baseSortedWords.map(dw => {
                        const u = state.units.find(x => x.id === dw._unitId);
                        const fresh = u ? u.words.find(fw => fw.id === dw.id) : null;
                        return fresh ? { ...fresh, _unitId: dw._unitId, _unitName: dw._unitName } : null;
                    }).filter(x => x !== null && x.note && x.note.trim() !== '');
                    state.baseSortedWords = updatedBase;
                }
                
                let displayNotes = state.baseSortedWords;
                if (query) {
                    displayNotes = displayNotes.filter(w => w.en.toLowerCase().includes(query) || w.zh.includes(query));
                }
                
                state.displayedWords = displayNotes;
                document.getElementById('activeUnitTitle').innerText = `📝 筆記彙整 (${displayNotes.length} 個單字)`;
                document.getElementById('reviewTrackingArea').classList.add('hidden');
                
            } else if (query) {
                if (forceSort || state.lastUnitId !== 'SEARCH') {
                    state.lastUnitId = 'SEARCH';
                    let allMatched = [];
                    state.units.forEach(u => {
                        (u.words || []).forEach(w => {
                            if (w.en.toLowerCase().includes(query) || w.zh.includes(query)) {
                                allMatched.push({ ...w, _unitId: u.id, _unitName: u.name });
                            }
                        });
                    });
                    if (sortVal === 'az') allMatched.sort((a,b) => a.en.localeCompare(b.en));
                    else if (sortVal === 'random') allMatched.sort(() => Math.random() - 0.5);
                    else if (sortVal === 'rating') allMatched.sort((a,b) => b.rating - a.rating);
                    else if (sortVal === 'starred') allMatched.sort((a,b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));
                    state.baseSortedWords = allMatched;
                } else {
                    let updatedBase = state.baseSortedWords.map(dw => {
                        const u = state.units.find(x => x.id === dw._unitId);
                        const fresh = u ? u.words.find(fw => fw.id === dw.id) : null;
                        return fresh ? { ...fresh, _unitId: dw._unitId, _unitName: dw._unitName } : null;
                    }).filter(x => x !== null);
                    state.baseSortedWords = updatedBase;
                }
                state.displayedWords = state.baseSortedWords;
                document.getElementById('activeUnitTitle').innerText = `搜尋結果 (${state.displayedWords.length} 個單字)`;
                document.getElementById('reviewTrackingArea').classList.add('hidden');
            } else {
                const u = state.units.find(x => x.id == state.activeUnitId);
                if (!u || !g) return;
                document.getElementById('reviewTrackingArea').classList.remove('hidden');

                if (forceSort || !state.baseSortedWords || state.baseSortedWords.length === 0 || state.lastUnitId !== state.activeUnitId) {
                    state.lastUnitId = state.activeUnitId;
                    let list = [...(u.words || [])].map(w => ({ ...w, _unitId: u.id, _unitName: u.name }));
                    if (sortVal === 'az') list.sort((a,b) => a.en.localeCompare(b.en));
                    else if (sortVal === 'random') list.sort(() => Math.random() - 0.5);
                    else if (sortVal === 'rating') list.sort((a,b) => b.rating - a.rating);
                    else if (sortVal === 'starred') list.sort((a,b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));
                    state.baseSortedWords = list;
                } else {
                    let updatedBase = state.baseSortedWords.map(dw => {
                        const fresh = u.words.find(fw => fw.id === dw.id);
                        return fresh ? { ...fresh, _unitId: u.id, _unitName: u.name } : null;
                    }).filter(x => x !== null);
                    
                    const existingIds = new Set(updatedBase.map(w => w.id));
                    const newWords = (u.words || []).filter(w => !existingIds.has(w.id)).map(w => ({ ...w, _unitId: u.id, _unitName: u.name }));
                    state.baseSortedWords = [...updatedBase, ...newWords];
                }
                state.displayedWords = [...state.baseSortedWords];
                document.getElementById('activeUnitTitle').innerText = u.name;
            }

            const updateBtn = (id, act) => { const b = document.getElementById(id); b && (act ? b.classList.add('active') : b.classList.remove('active')); };
            ['both','en','zh'].forEach(m => updateBtn(`btn-${m}`, state.globalMode === m));
            ['syllables', 'vowels', 'rating', 'note'].forEach(f => updateBtn(`toggle-${f}-btn`, state['show'+f.charAt(0).toUpperCase()+f.slice(1)]));
            
            if(!g) return;
            g.innerHTML = state.displayedWords.map((w, idx) => {
                const mode = w.localMode || state.globalMode;
                const unitBadge = (query || state.showAllNotesMode) ? `<span class="absolute top-4 left-10 px-2 py-0.5 bg-indigo-100 text-indigo-700 text-[9px] rounded-md shadow-sm font-bold">${w._unitName}</span>` : '';
                return `<div data-word-id="${w.id}" onclick="window.speak('${w.en.replace(/'/g, "\\'")}')" class="word-card card-${mode} hover:shadow-xl transition-all relative">
                <span style="position:absolute; top:-10px; left:-10px; width:22px; height:22px; background:white; border:1px solid #e2e8f0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#cbd5e1; z-index:10;">${idx+1}</span>
                ${unitBadge}
                
                <div class="absolute top-4 right-4">
                    <button onclick="event.stopPropagation(); window.cycleWordMode('${w.id}', '${w._unitId}')" class="card-mode-toggle font-bold"><span>切換</span></button>
                </div>
                
                <h4 class="word-en text-4xl font-black mt-2">${window.highlightText(w.en)}</h4>
                <p class="word-zh text-indigo-600 font-bold text-xl mt-1">${w.zh}</p>
                
                <!-- 🚀 編輯按鈕與星星按鈕放一起 -->
                <div class="absolute bottom-4 right-4 flex gap-2">
                    ${!state.isGuestMode ? `
                    <button onclick="event.stopPropagation(); window.toggleStar('${w.id}', '${w._unitId}')" class="p-1.5 ${w.starred ? 'bg-amber-50 text-amber-500' : 'bg-slate-100 text-slate-400'} rounded-lg hover:bg-amber-50 hover:text-amber-500 transition-all"><i data-lucide="star" class="w-4 h-4 ${w.starred ? 'fill-current' : ''}"></i></button>
                    <button onclick="event.stopPropagation(); window.openWordEdit('${w.id}', '${w._unitId}')" class="p-1.5 bg-slate-100 rounded-lg hover:bg-indigo-100 text-slate-400 hover:text-indigo-600 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                    ` : (w.starred ? `<span class="p-1.5 bg-amber-50 text-amber-500 rounded-lg"><i data-lucide="star" class="w-4 h-4 fill-current"></i></span>` : '')}
                </div>

                ${state.showRating ? `
                <div class="flex gap-1 mt-auto pt-4 pr-20">
                    ${[1,2,3,4,5].map(n => `<button ${state.isGuestMode ? 'disabled' : `onclick="event.stopPropagation(); window.updateRating('${w.id}', ${n}, '${w._unitId}')"`} class="rate-btn ${w.rating==n?'rate-'+n:'bg-slate-100 text-slate-400'} ${state.isGuestMode ? 'cursor-default opacity-80' : ''}">${n}</button>`).join('')}
                </div>` : ''}
                
                ${state.showNote ? `
                <textarea class="note-field mt-2" placeholder="備註..." ${state.isGuestMode ? 'readonly' : `onblur="window.updateNote('${w.id}', this.value, '${w._unitId}')"`} onclick="event.stopPropagation()">${w.note || ''}</textarea>` : ''}
            </div>`}).join(''); 
            lucide.createIcons(); 
            if(!query && !state.showAllNotesMode) window.renderReviewTracking();
        };

        window.renderUnitList = () => {
            const container = document.getElementById('unitTreeList'); if (!container) return;
            let html = "";
            state.folders.forEach(f => {
                const open = state.openFolders.has(f.id);
                const uS = state.units.filter(u => u.folderId === f.id);
                html += `<div class="mb-1"><div class="folder-header" onclick="window.toggleFolder('${f.id}')">
                    <div class="flex items-center gap-2"><i data-lucide="${open?'folder-open':'folder'}" class="w-4 h-4 text-amber-500 font-bold"></i><span>${f.name}</span></div>
                    ${!state.isGuestMode ? `
                    <div class="flex gap-1 items-center">
                        <button onclick="event.stopPropagation(); window.moveFolder('${f.id}', -1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i></button>
                        <button onclick="event.stopPropagation(); window.moveFolder('${f.id}', 1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></button>
                        <button onclick="event.stopPropagation(); window.renameFolder('${f.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                        <button onclick="event.stopPropagation(); window.deleteFolder('${f.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-rose-500"></i></button>
                    </div>` : ''}
                </div>
                ${open ? `<div class="folder-content">${uS.map(u => `<div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId==u.id && !state.showAllNotesMode ?'active':''}">
                        <span class="truncate flex-1 font-bold">${u.name}</span>
                        ${!state.isGuestMode ? `
                        <div class="flex gap-1 items-center">
                            <button onclick="event.stopPropagation(); window.moveUnit('${u.id}', -1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i></button>
                            <button onclick="event.stopPropagation(); window.moveUnit('${u.id}', 1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></button>
                            <button onclick="event.stopPropagation(); window.renameUnit('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                            <button onclick="event.stopPropagation(); window.openMoveModal('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="folder-input" class="w-3.5 h-3.5"></i></button>
                            <button onclick="event.stopPropagation(); window.deleteUnit('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-rose-500"></i></button>
                        </div>` : ''}
                    </div>`).join('')}</div>` : ''}</div>`;
            });
            const unc = state.units.filter(u => !u.folderId);
            html += unc.map(u => `<div onclick="window.setActiveUnit('${u.id}')" class="unit-item ${state.activeUnitId==u.id && !state.showAllNotesMode ?'active':''}">
                <span class="truncate flex-1 font-bold">${u.name}</span>
                ${!state.isGuestMode ? `
                <div class="flex gap-1 items-center">
                    <button onclick="event.stopPropagation(); window.moveUnit('${u.id}', -1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i></button>
                    <button onclick="event.stopPropagation(); window.moveUnit('${u.id}', 1)" class="opacity-40 hover:opacity-100"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></button>
                    <button onclick="event.stopPropagation(); window.renameUnit('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                    <button onclick="event.stopPropagation(); window.openMoveModal('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="folder-input" class="w-3.5 h-3.5"></i></button>
                    <button onclick="event.stopPropagation(); window.deleteUnit('${u.id}')" class="opacity-40 hover:opacity-100"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-rose-500"></i></button>
                </div>` : ''}
            </div>`).join('');
            container.innerHTML = html; lucide.createIcons();
        };

        // --- 初始化 & 登入 ---
        onAuthStateChanged(auth, async (user) => {
            const params = new URLSearchParams(window.location.search);
            const viewType = params.get('view'), guestId = params.get('id');
            if (!user) { await signInAnonymously(auth); return; }
            if (viewType === 'guest' && guestId) {
                state.isGuestMode = true; state.userLabel = guestId; 
                document.getElementById('addUnitSection').classList.add('hidden');
                document.getElementById('btnPublishGuest').classList.add('hidden');
                window.showAppUI("訪客唯讀模式"); 
                syncData();
                document.getElementById('baseDateInput').disabled = true;
                document.getElementById('baseTimeInput').disabled = true;
            } else if (sessionStorage.getItem('admin_session')) {
                state.userLabel = 'yljh'; window.showAdminDashboard(); syncData();
            } else if (sessionStorage.getItem('custom_user_session')) {
                state.userLabel = sessionStorage.getItem('custom_user_session'); window.showAppUI(state.userLabel); syncData();
            } else { document.getElementById('authScreen').classList.remove('hidden'); }
            lucide.createIcons();
        });

        function syncData() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'folders'), snap => {

        window.closeAdminDetail = () => document.getElementById('adminDetailModal').classList.add('hidden');
        window.closeMoveModal = () => document.getElementById('moveFolderModal').classList.add('hidden');
        
        window.showAdminDashboard = () => { document.getElementById('appScreen').classList.add('hidden'); document.getElementById('adminScreen').classList.remove('hidden'); onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'custom_accounts'), snap => {
            document.getElementById('adminUserTable').innerHTML = snap.docs.map(d => `<tr class="border-b"><td>${d.id}</td><td class="text-right pr-12"><button onclick="window.adminDetail('${d.id}','${d.id}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-bold">詳情</button></td></tr>`).join('');
            document.getElementById('sourceAccountSelect').innerHTML = `<option value="yljh">管理者模板</option>` + snap.docs.map(d => `<option value="${d.id}">${d.id}</option>`).join('');
        }); onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), snap => { state.allUnitsCache = snap.docs.map(d => ({id: d.id, ...d.data()})); }); };
        window.updateSourceUnitList = () => { const src = document.getElementById('sourceAccountSelect').value; const fil = state.allUnitsCache.filter(u => u.ownerId === src); document.getElementById('masterUnitSelect').innerHTML = fil.map(u => `<option value="${u.id}">${u.name}</option>`).join(''); };
        window.assignUnitToStudent = async () => { const uid = document.getElementById('masterUnitSelect').value, target = state.currentAdminViewUid; if(!uid || !target) return; const src = state.allUnitsCache.find(u => u.id === uid); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'units', 'u'+Date.now()), { ...src, ownerId: target, reviewProgress: {}, order: Date.now() }); alert("已分派"); };
        window.adminDetail = (uid, n) => { state.currentAdminViewUid = uid; document.getElementById('adminDetailModal').classList.remove('hidden'); document.getElementById('detailUserTitle').innerText = n; const fil = state.allUnitsCache.filter(u => u.ownerId === uid); document.getElementById('detailContent').innerHTML = fil.map(u => `<div class="p-3 bg-white border rounded-lg shadow-sm font-bold"><h6>${u.name}</h6></div>`).join('') || '無資料'; };
    </script>
</body>
</html>
